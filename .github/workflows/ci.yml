name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, menu-service, order-service, delivery-service]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Test ${{ matrix.service }}
        run: npm test --workspace=services/${{ matrix.service }}
        env:
          JWT_SECRET: ci-test-secret-at-least-32-chars-long
          JWT_REFRESH_SECRET: ci-test-refresh-secret-at-least-32
